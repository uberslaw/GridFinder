<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>Grow increments</title>
    <link rel="stylesheet" href="controls.css" />
    <link rel="stylesheet" href="increments.css" />
  </head>
  <body>
    <div class="titlebar">
      <div class="titlebar-bevel">
        <span class="titlebar-grip" aria-hidden="true"></span>
        <span class="titlebar-label">Grow increment</span>
      </div>
      <div class="titlebar-actions">
        <button type="button" id="btnClose" class="icon-btn danger" title="Close">✕</button>
      </div>
    </div>

    <div class="panel-body increments-body">
      <p class="help">
        After <strong>Ctrl+Shift+Arrow</strong> docks the grid, <strong>Ctrl+Arrow</strong>
        grows or shrinks by this step.
      </p>

      <h2 class="subhead">Unit</h2>
      <div class="mode-row unit-row">
        <button type="button" class="mode-btn" data-mode="fraction">Fraction</button>
        <button type="button" class="mode-btn" data-mode="percent">Percent</button>
        <button type="button" class="mode-btn" data-mode="pixel">Pixels</button>
        <button type="button" class="mode-btn" data-mode="mm">mm</button>
        <button type="button" class="mode-btn" data-mode="inch">Inches</button>
      </div>

      <h2 class="subhead">Value</h2>
      <div id="fractionChoices" class="choice-grid"></div>
      <div id="percentChoices" class="choice-grid hidden"></div>
      <label class="field" id="numericField">
        <span class="field-label">Custom <strong id="valueLabel">—</strong></span>
        <input type="number" id="valueInput" min="0.001" step="any" />
      </label>

      <p class="dpi-note" id="previewNote">Step ≈ —</p>
    </div>

    <script src="increments.js"></script>
  </body>
</html>
